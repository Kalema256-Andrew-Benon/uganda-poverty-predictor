[theme]
primaryColor = "#D90000"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#ECF0F1"
textColor = "#2C3E50"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10
maxMessageSize = 10

[browser]
gatherUsageStats = false

[runner]
magicEnabled = true
fastReruns = true
enforceSerializableSessionState = true

[mapbox]
token = ""
